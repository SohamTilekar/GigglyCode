type: Program
statements:
  - type: StructDecelerationStatement
    name: "type: IdentifierLiteral\nvalue: MyException"
    fields:
      - type: VariableDeclarationStatement
        name: "type: IdentifierLiteral\nvalue: code"
        value_type:
          type: Type
          name: "type: IdentifierLiteral\nvalue: int"
          generics: []
        value: "null"
        volatile: false
      - type: FunctionStatement
        name: "type: IdentifierLiteral\nvalue: __init__"
        parameters:
          - type: FunctionParameter
            param_name: "type: IdentifierLiteral\nvalue: self"
            param_type:
              type: Type
              name: "type: IdentifierLiteral\nvalue: MyException"
              generics: []
          - type: FunctionParameter
            param_name: "type: IdentifierLiteral\nvalue: code"
            param_type:
              type: Type
              name: "type: IdentifierLiteral\nvalue: int"
              generics: []
        return_type: "null"
        body:
          type: BlockStatement
          statements:
            - type: VariableAssignmentStatement
              name: "type: InfixedExpression\noperator: Dot(`.`)\nleft_node:\n  type: IdentifierLiteral\n  value: self\nright_node:\n  type: IdentifierLiteral\n  value: code"
              value:
                type: IdentifierLiteral
                value: code
        generic: []
    generics: []
  - type: FunctionStatement
    name: "type: IdentifierLiteral\nvalue: throw_func"
    parameters:
      - type: FunctionParameter
        param_name: "type: IdentifierLiteral\nvalue: val"
        param_type:
          type: Type
          name: "type: IdentifierLiteral\nvalue: int"
          generics: []
    return_type:
      type: Type
      name: "type: IdentifierLiteral\nvalue: int"
      generics: []
    body:
      type: BlockStatement
      statements:
        - type: IfElseStatement
          condition:
            type: InfixedExpression
            operator: LessThan(`<`)
            left_node:
              type: IdentifierLiteral
              value: val
            right_node:
              type: IntegerLiteral
              value: 0
          consequence:
            type: BlockStatement
            statements:
              - type: RaiseStatement
                value:
                  type: CallExpression
                  name: "type: IdentifierLiteral\nvalue: MyException"
                  arguments:
                    - type: IdentifierLiteral
                      value: val
          alternative: "null"
        - type: ReturnStatement
          value:
            type: InfixedExpression
            operator: Asterisk(`*`)
            left_node:
              type: IdentifierLiteral
              value: val
            right_node:
              type: IntegerLiteral
              value: 2
    generic: []
  - type: FunctionStatement
    name: "type: IdentifierLiteral\nvalue: main"
    parameters: []
    return_type:
      type: Type
      name: "type: IdentifierLiteral\nvalue: int"
      generics: []
    body:
      type: BlockStatement
      statements:
        - type: TryCatchStatement
          try:
            type: BlockStatement
            statements:
              - type: ExpressionStatement
                Expression:
                  type: CallExpression
                  name: "type: IdentifierLiteral\nvalue: printf"
                  arguments:
                    - type: StringLiteral
                      value: "Trying positive: %i\n"
                    - type: CallExpression
                      name: "type: IdentifierLiteral\nvalue: throw_func"
                      arguments:
                        - type: IntegerLiteral
                          value: 5
              - type: ExpressionStatement
                Expression:
                  type: CallExpression
                  name: "type: IdentifierLiteral\nvalue: printf"
                  arguments:
                    - type: StringLiteral
                      value: "Trying negative...\n"
              - type: ExpressionStatement
                Expression:
                  type: CallExpression
                  name: "type: IdentifierLiteral\nvalue: throw_func"
                  arguments:
                    - type: IntegerLiteral
                      value: -100
              - type: ExpressionStatement
                Expression:
                  type: CallExpression
                  name: "type: IdentifierLiteral\nvalue: printf"
                  arguments:
                    - type: StringLiteral
                      value: "This should not be printed!\n"
          catch:
            - type:
                type: Type
                name: "type: IdentifierLiteral\nvalue: MyException"
                generics: []
              var:
                type: IdentifierLiteral
                value: e
              block:
                type: BlockStatement
                statements:
                  - type: ExpressionStatement
                    Expression:
                      type: CallExpression
                      name: "type: IdentifierLiteral\nvalue: printf"
                      arguments:
                        - type: StringLiteral
                          value: "Caught exception with code: %i\n"
                        - type: InfixedExpression
                          operator: Dot(`.`)
                          left_node:
                            type: IdentifierLiteral
                            value: e
                          right_node:
                            type: IdentifierLiteral
                            value: code
        - type: ReturnStatement
          value:
            type: IntegerLiteral
            value: 0
    generic: []
